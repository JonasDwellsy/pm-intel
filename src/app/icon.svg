<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <title>Dwellsy IQ</title>
  <!--
    Adaptive favicon — the IQ mark swaps color to track the user's OS /
    browser color-scheme preference so the brand yellow (#FCD131,
    sampled from the logo asset) stops washing out against light tab
    backgrounds. Modern Chrome / Firefox / Safari honor inline
    <style> + prefers-color-scheme inside SVG favicons.

    Background is transparent — the favicon renders directly on top of
    the tab chrome, so the IQ glyph's contrast comes from picking the
    right color for the surrounding theme.

    Default (light mode): black IQ on whatever the tab background is
    (typically white) — high contrast, reads as the wordmark's
    "Dwellsy" half.

    Dark mode: brand yellow IQ on the tab's dark chrome — the brand
    color stays visible without the white-card wash-out the prior
    embedded-PNG approach produced.

    The .ico fallback (src/app/favicon.ico) ships a static black-on-
    white render for older browsers that don't use icon.svg first;
    light mode is the majority, so black is the safer static choice.
  -->
  <style>
    .iq { fill: #000000; }
    @media (prefers-color-scheme: dark) {
      .iq { fill: #FCD131; }
    }
  </style>
  <text
    class="iq"
    x="32"
    y="48"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="48"
    font-weight="900"
    letter-spacing="-2"
  >IQ</text>
</svg>
